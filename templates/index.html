<!DOCTYPE html>
<html>
<head>
  <title>AI DJ - Simple Fusion</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; padding: 40px; text-align: center; }
    select { padding: 10px; font-size: 16px; width: 300px; margin: 10px; }
    button { padding: 15px 40px; font-size: 18px; background: #7c3aed; color: white; border: none; cursor: pointer; margin: 20px; }
    button:hover { background: #6d28d9; }
    #result { margin-top: 30px; }
    audio { margin-top: 20px; width: 500px; }
    .loading { color: #aaa; }
    .error { color: #ef4444; }
    .success { color: #10b981; }
  </style>
</head>
<body>
  <h1>🎛️ AI DJ Fusion</h1>
  
  <div>
    <label>Song 1:</label><br>
    <select id="song1"></select>
  </div>
  
  <div>
    <label>Song 2:</label><br>
    <select id="song2"></select>
  </div>
  
  <button onclick="createFusion()">Fuse Songs</button>
  
  <div id="result"></div>

  <script>
    let audioPlayer = null;

    // Load songs
    fetch('/api/songs')
      .then(r => r.json())
      .then(data => {
        const songs = data.songs || [];
        const opts = songs.map(s => `<option value="${s.id}">${s.title}</option>`).join('');
        document.getElementById('song1').innerHTML = opts;
        document.getElementById('song2').innerHTML = opts;
      });

    async function createFusion() {
      const s1 = document.getElementById('song1').value;
      const s2 = document.getElementById('song2').value;
      const result = document.getElementById('result');
      
      result.innerHTML = '<p class="loading">Creating fusion...</p>';
      
      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({song1_id: s1, song2_id: s2})
        });
        
        const data = await res.json();
        
        if (data.fusion && data.fusion.status === 'generated') {
          result.innerHTML = `
            <p class="success">✅ Fusion created!</p>
            <p>BPM: ${data.fusion.bpm.song1}</p>
            <p>Techniques: ${data.fusion.techniques_used.join(', ')}</p>
          `;
          
          // Play the fusion
          if (audioPlayer) audioPlayer.pause();
          audioPlayer = new Audio(data.fusion.output_path);
          audioPlayer.volume = 0.8;
          audioPlayer.play();
          
          result.innerHTML += `<audio controls autoplay src="${data.fusion.output_path}"></audio>`;
        } else {
          result.innerHTML = `<p class="error">❌ Error: ${data.fusion?.error || 'Unknown'}</p>`;
        }
      } catch (e) {
        result.innerHTML = `<p class="error">❌ Error: ${e}</p>`;
      }
    }
  </script>
</body>
</html>
