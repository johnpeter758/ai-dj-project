apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-dj-ingress
  namespace: ai-dj
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "100M"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - host: ai-dj.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-dj-service
                port:
                  number: 80
  tls:
    - hosts:
        - ai-dj.example.com
      secretName: ai-dj-tls-secret
