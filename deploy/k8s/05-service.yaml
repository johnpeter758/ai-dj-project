apiVersion: v1
kind: Service
metadata:
  name: ai-dj-service
  namespace: ai-dj
  labels:
    app: ai-dj
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: ai-dj
    component: server
---
apiVersion: v1
kind: Service
metadata:
  name: ai-dj-service-lb
  namespace: ai-dj
  labels:
    app: ai-dj
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: ai-dj
    component: server
