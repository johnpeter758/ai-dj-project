apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-dj-data-pvc
  namespace: ai-dj
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-dj-exports-pvc
  namespace: ai-dj
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
