apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-dj

resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 02-secret.yaml
  - 03-pvc.yaml
  - 04-deployment.yaml
  - 05-service.yaml
  - 06-ingress.yaml
  - 07-hpa.yaml

commonLabels:
  app: ai-dj
  managed-by: kustomize

images:
  - name: ai-dj-server
    newTag: latest
